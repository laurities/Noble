<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="nav-inner">
    <a href="index.html" class="brand">Noble <em>A.</em></a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <div class="wrap page-hero">
    <div class="eyebrow">Contact</div>
    <h1>Let's talk about the role.</h1>
  </div>

  <section class="tight">
    <div class="wrap contact-grid">

      <div class="contact-detail">
        <div class="contact-row">
          <span class="lbl">Email</span>
          <a class="val" href="mailto:noblelaurities@gmail.com">noblelaurities@gmail.com</a>
        </div>
        <div class="contact-row">
          <span class="lbl">Phone</span>
          <a class="val" href="tel:+918608047355">+91 86080 47355</a>
        </div>
        <div class="contact-row">
          <span class="lbl">Location</span>
          <span class="val">Tamil Nadu, India</span>
        </div>
        <div class="contact-row" style="border-bottom:none;">
          <span class="lbl">Portfolio</span>
          <a class="val" href="https://laurities.github.io/Noble/" target="_blank" rel="noopener">laurities.github.io/Noble</a>
        </div>
      </div>

      <form class="contact-form" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="align-self:flex-start;">Send message</button>
        <p id="form-status" role="status"></p>
      </form>

    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <p>&copy; 2026 Noble Arokiyaraj Devanbu</p>
    <div class="footer-links">
      <a href="mailto:noblelaurities@gmail.com">Email</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
